name: Daily Emailer

on:
  schedule:
    # Runs at 07:00 UTC/GMT every day
    - cron: '0 7 * * *'
  # Allows you to run it manually from the Actions tab for testing
  workflow_dispatch:

jobs:
  run-emailer:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Emailer Script
      env:
        SUSSEX_USER: ${{ secrets.SUSSEX_USER }}
        SUSSEX_PASS: ${{ secrets.SUSSEX_PASS }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
      run: python emailer.py